<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #70c5ce;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: none;
        }
        #restartBtn {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 24px;
            font-size: 18px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <div id="score">النقاط: 0</div>
        <div id="msg">المس الشاشة للبدء</div>
    </div>
    <button id="restartBtn" onclick="resetGame()">إعادة اللعب</button>

    <script>
        // إعدادات المشهد والكاميرا
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x70c5ce);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // المتغيرات الأساسية للعبة
        let bird, pipes = [];
        let birdVelocity = 0;
        const gravity = -0.005;
        const jumpStrength = 0.12;
        let score = 0;
        let gameStarted = false;
        let gameOver = false;
        
        const pipeSpeed = 0.08;
        const pipeSpawnInterval = 90; // عدد الإطارات بين كل أنبوبين
        let frameCount = 0;

        // إنشاء الطائر (كرة حمراء ثلاثية الأبعاد تبسط المجسم)
        function createBird() {
            const geometry = new THREE.SphereGeometry(0.4, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.4 });
            bird = new THREE.Mesh(geometry, material);
            bird.position.set(-2, 0, 0);
            scene.add(bird);
        }

        // إنشاء أرضية مبسطة
        const floorGeo = new THREE.BoxGeometry(20, 1, 5);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x73bf2e });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -5;
        scene.add(floor);

        // وضعية الكاميرا (رؤية جانبية مائلة قليلاً للعمق الـ 3D)
        camera.position.set(0, 0, 7);

        // دالة إنشاء الأنابيب (الـ Pipes)
        function spawnPipe() {
            const gap = 2.5; // الفجوة بين الأنبوب العلوي والسفلي
            const pipeWidth = 0.8;
            const minHeight = 1.5;
            const maxHeight = 5;
            const totalHeight = 10;
            
            // حساب طول عشوائي للأنبوب السفلي
            const bottomHeight = minHeight + Math.random() * (maxHeight - minHeight);
            const topHeight = totalHeight - bottomHeight - gap;

            const pipeMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, roughness: 0.3 });

            // الأنبوب السفلي
            const bottomGeo = new THREE.BoxGeometry(pipeWidth, bottomHeight, 0.8);
            const bottomPipe = new THREE.Mesh(bottomGeo, pipeMat);
            bottomPipe.position.set(6, -5 + (bottomHeight / 2), 0);
            scene.add(bottomPipe);

            // الأنبوب العلوي
            const topGeo = new THREE.BoxGeometry(pipeWidth, topHeight, 0.8);
            const topPipe = new THREE.Mesh(topGeo, pipeMat);
            topPipe.position.set(6, 5 - (topHeight / 2), 0);
            scene.add(topPipe);

            // تخزين الأنابيب للتحريك وفحص التصادم
            pipes.push({
                top: topPipe,
                bottom: bottomPipe,
                passed: false,
                topBounds: { minX: 0, maxX: 0, minY: 0, maxY: 0 },
                bottomBounds: { minX: 0, maxX: 0, minY: 0, maxY: 0 }
            });
        }

        // التحكم باللمس والضغط
        function handleJump() {
            if (gameOver) return;
            if (!gameStarted) {
                gameStarted = true;
                document.getElementById("msg").style.display = "none";
            }
            birdVelocity = jumpStrength;
        }

        window.addEventListener('pointerdown', handleJump);
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleJump(); });

        // إعادة تشغيل اللعبة
        function resetGame() {
            // تنظيف الأنابيب القديمة من المشهد
            pipes.forEach(p => {
                scene.remove(p.top);
                scene.remove(p.bottom);
            });
            pipes = [];
            
            // إعادة تعيين الطائر
            bird.position.set(-2, 0, 0);
            birdVelocity = 0;
            
            // إعادة تعيين العدادات
            score = 0;
            document.getElementById("score").innerText = "النقاط: " + score;
            document.getElementById("restartBtn").style.display = "none";
            document.getElementById("msg").style.display = "block";
            
            gameOver = false;
            gameStarted = false;
        }

        // دالة فحص التصادم AABB (مبسطة)
        function checkCollision(mesh1, mesh2, size1, size2Width, size2Height) {
            const b1 = {
                minX: mesh1.position.x - size1, maxX: mesh1.position.x + size1,
                minY: mesh1.position.y - size1, maxY: mesh1.position.y + size1
            };
            const b2 = {
                minX: mesh2.position.x - (size2Width/2), maxX: mesh2.position.x + (size2Width/2),
                minY: mesh2.position.y - (size2Height/2), maxY: mesh2.position.y + (size2Height/2)
            };
            return (b1.minX <= b2.maxX && b1.maxX >= b2.minX) && (b1.minY <= b2.maxY && b1.maxY >= b2.minY);
        }

        // تشغيل اللعبة لأول مرة
        createBird();

        // حلقة اللعبة الأساسية (Game Loop)
        function animate() {
            requestAnimationFrame(animate);

            if (gameStarted && !gameOver) {
                // تطبيق الجاذبية وحركة الطائر
                birdVelocity += gravity;
                bird.position.y += birdVelocity;
                
                // تدوير الطائر بناءً على سرعته لإعطاء مظهر تفاعلي
                bird.rotation.z = birdVelocity * 4;

                // التحقق من السقوط على الأرض أو الخروج من السقف
                if (bird.position.y <= -4.2 || bird.position.y >= 5) {
                    endGame();
                }

                // إدارة الأنابيب
                frameCount++;
                if (frameCount % pipeSpawnInterval === 0) {
                    spawnPipe();
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    let p = pipes[i];
                    p.top.position.x -= pipeSpeed;
                    p.bottom.position.x -= pipeSpeed;

                    // فحص التصادم مع الأنبوب العلوي أو السفلي
                    // الأبعاد: الطائر قطره 0.4، الأنبوب عرضه 0.8 وطوله متغير يتم حسابه من الجيومتري
                    const topH = p.top.geometry.parameters.height;
                    const botH = p.bottom.geometry.parameters.height;

                    if (checkCollision(bird, p.top, 0.4, 0.8, topH) || checkCollision(bird, p.bottom, 0.4, 0.8, botH)) {
                        endGame();
                    }

                    // احتساب النقاط عند تجاوز الأنبوب
                    if (!p.passed && p.top.position.x < bird.position.x) {
                        p.passed = true;
                        score++;
                        document.getElementById("score").innerText = "النقاط: " + score;
                    }

                    // حذف الأنابيب التي خرجت من الشاشة
                    if (p.top.position.x < -6) {
                        scene.remove(p.top);
                        scene.remove(p.bottom);
                        pipes.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function endGame() {
            gameOver = true;
            document.getElementById("msg").innerText = "خسرت!";
            document.getElementById("msg").style.display = "block";
            document.getElementById("restartBtn").style.display = "block";
        }

        // ملاءمة الشاشة عند تغيير أبعادها أو تدوير الهاتف
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // بدء تشغيل الحلقة
        animate();
    </script>
</body>
</html>
