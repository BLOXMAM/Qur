<!-- حاوية لعرض الصفحات الديناميكية المضافة من الأدمن -->
<div id="dynamic-pages-section" style="margin: 15px; padding: 10px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none;">
    <h3 style="margin-top: 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 5px;">صفحات وخدمات إضافية</h3>
    <div id="pages-container" style="display: flex; flex-direction: column; gap: 8px;">
        <!-- سيتم توليد الأزرار هنا تلقائياً -->
    </div>
</div>

<script>
    // الإعدادات الخاصة بمستودعك (تطابق الإعدادات التي يرفع عليها الأدمن)
    const GIT_USER = "BLOXMAM"; // اسم مستخدم جيت هاب الخاص بك
    const GIT_REPO = "Qur";     // اسم المستودع

    document.addEventListener("DOMContentLoaded", function() {
        fetchDynamicPages();
    });

    function fetchDynamicPages() {
        const url = `https://api.github.com/repos/${GIT_USER}/${GIT_REPO}/contents`;

        fetch(url)
        .then(response => {
            if(!response.ok) throw new Error();
            return response.json();
        })
        .then(data => {
            // فلترة جلب ملفات الـ HTML فقط واستبعاد الملف الرئيسي index.html أو index1.html
            const pages = data.filter(file => 
                file.type === "file" && 
                file.name.toLowerCase().endsWith(".html") && 
                file.name.toLowerCase() !== "index.html" && 
                file.name.toLowerCase() !== "index1.html"
            );

            if(pages.length > 0) {
                const section = document.getElementById("dynamic-pages-section");
                const container = document.getElementById("pages-container");
                
                section.style.display = "block"; // إظهار القسم لوجود صفحات جديدة
                container.innerHTML = "";

                pages.forEach(page => {
                    const cleanName = page.name.replace(".html", ""); // إزالة الامتداد للعرض الجمالي
                    const btn = document.createElement("button");
                    
                    // تصميم أنيق مريح للضغط كأنه زر في تطبيق أندرويد
                    btn.style.cssText = "width: 100%; padding: 12px; border: 1px solid #18bc9c; background: #eefbf9; color: #16a085; border-radius: 6px; font-weight: bold; font-size: 0.95rem; text-align: right; cursor: pointer; display: flex; justify-content: space-between; align-items: center;";
                    btn.innerHTML = `<span>📄 ${cleanName}</span> <span style="font-size: 0.8rem; color: #7f8c8d;">اضغط للفتح ←</span>`;
                    
                    // عند الضغط، يفتح الرابط مباشرة في نفس الـ WebView كأنه أكتيفيتي داخلي
                    btn.onclick = function() {
                        window.location.href = `https://${GIT_USER}.github.io/${GIT_REPO}/${page.name}`;
                    };
                    
                    container.appendChild(btn);
                });
            }
        })
        .catch(err => {
            // في حال عدم وجود إنترنت، سيختفي القسم تلقائياً ليعمل التطبيق أوفلاين بسلام تام
            document.getElementById("dynamic-pages-section").style.display = "none";
        });
    }
</script>
