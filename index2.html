<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فهرس صفحات القرآن الكريم</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 24px;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .online { background-color: #d4edda; color: #155724; }
        .offline { background-color: #f8d7da; color: #721c24; }

        .pages-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            padding: 0;
            list-style: none;
        }

        .page-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e1e8ed;
        }

        .page-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .page-link {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin-bottom: 8px;
        }

        .page-link:hover {
            color: var(--accent-color);
        }

        .file-size {
            font-size: 12px;
            color: #95a5a6;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مستودع صفحات القرآن الكريم</h1>
        <p class="subtitle">تصفح مستمر ومحفوظ على جهازك دائماً</p>
        
        <!-- شارة توضح حالة الشبكة لتأكيد عمل الأوفلاين للمستخدم -->
        <div id="networkStatus" class="status-badge online">جاري فحص الاتصال...</div>

        <div id="loader" class="loader"></div>

        <ul id="pagesList" class="pages-list"></ul>
    </div>

    <script>
        const username = "BLOXMAM";
        const repo = "Qur";

        function formatTitle(fileName) {
            let nameWithoutExt = fileName.replace(".html", "");
            return nameWithoutExt.replace(/[-_]/g, " ");
        }

        // تحديث شارة حالة الاتصال بالإنترنت في الواجهة
        function updateStatusIndicator() {
            const statusBadge = document.getElementById("networkStatus");
            if (navigator.onLine) {
                statusBadge.textContent = "متصل بالإنترنت (عرض مباشر وتحديث تلقائي)";
                statusBadge.className = "status-badge online";
            } else {
                statusBadge.textContent = "يعمل بدون إنترنت (تصفح من النسخة المحفوظة)";
                statusBadge.className = "status-badge offline";
            }
        }

        // دالة لعرض البيانات في الصفحة
        function renderPages(htmlFiles) {
            const pagesList = document.getElementById("pagesList");
            pagesList.innerHTML = ""; // تنظيف القائمة أولاً

            if (htmlFiles.length === 0) {
                pagesList.innerHTML = "<li>لا توجد صفحات محفوظة أو متوفرة حالياً.</li>";
                return;
            }

            htmlFiles.forEach(file => {
                const listItem = document.createElement("li");
                listItem.className = "page-card";

                let targetUrl = "";
                
                if (navigator.onLine) {
                    // إذا كان متصلاً بالإنترنت: يفتح من رابط الـ Raw المترجم في السحاب
                    targetUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/${file.name}`;
                } else {
                    // إذا كان أوفلاين: يوجه WebView مباشرة للملف الذي قام كود الجافا بحفظه محلياً في جهازك
                    targetUrl = `file:///data/user/0/${window.location.pathname.split('/')[3]}/files/${file.name}`;
                }

                const readableTitle = formatTitle(file.name);
                const sizeInKB = (file.size / 1024).toFixed(1);

                listItem.innerHTML = `
                     <a class="page-link" href="#" onclick="openPage('${file.name}'); return false;">${readableTitle}</a>
    <span class="file-size">الحجم: ${sizeInKB} كيلوبايت</span>   `;
                pagesList.appendChild(listItem);
            });
        }

        async function initPage() {
            updateStatusIndicator();
            const loader = document.getElementById("loader");

            // 1. محاولة تحميل القائمة المخزنة محلياً "أولاً" لتظهر فوراً بدون أي تأخير
            const savedData = localStorage.getItem("github_pages_cache");
            if (savedData) {
                const cachedFiles = JSON.parse(savedData);
                renderPages(cachedFiles);
                loader.style.display = "none"; // إخفاء التحميل لأننا عرضنا الكاش بالفعل
            }

            // 2. إذا كان الجهاز متصلاً بالإنترنت، نقوم بجلب القائمة الجديدة وتحديث التخزين
            if (navigator.onLine) {
                try {
                    const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents?ref=main`);
                    if (response.ok) {
                        const files = await response.json();
                        
                        const htmlFiles = files.filter(file => 
                            file.name.endsWith('.html') && 
                            file.name !== 'index.html' && 
                            file.name !== 'index1.html' && 
                            file.name !== 'index2.html'
                        );

                        // حفظ النسخة الجديدة بشكل دائم في متصفح التطبيق
                        localStorage.setItem("github_pages_cache", JSON.stringify(htmlFiles));
                        
                        // إعادة رندرة الصفحة بالقائمة الجديدة والمحدثة
                        renderPages(htmlFiles);
                    }
                } catch (error) {
                    console.log("خطأ في تحديث البيانات السحابية، تم الاعتماد على الكاش المحلي فقط.");
                } finally {
                    loader.style.display = "none";
                }
            } else {
                loader.style.display = "none";
            }
        }

        // الاستماع لتغير حالة الشبكة وتحديث الواجهة فوراً
        window.addEventListener('online', updateStatusIndicator);
        window.addEventListener('offline', updateStatusIndicator);

        window.onload = initPage;
// دالة ذكية لتحديد طريقة فتح الصفحة بناءً على حالة الإنترنت
function openPage(fileName) {
    if (navigator.onLine) {
        // إذا كان أونلاين: يفتح الرابط السحابي المباشر
        window.location.href = `https://raw.githubusercontent.com/${username}/${repo}/main/${fileName}`;
    } else {
        // إذا كان أوفلاين: يرسل اسم الملف فقط إلى كود الأندرويد ليفتحه بأمان
        if (window.Android && typeof window.Android.openLocalPage === 'function') {
            window.Android.openLocalPage(fileName);
        } else {
            // حل احتياطي في حال لم يتعرف على الجسر فوراً
            window.location.href = fileName; 
        }
    }
}
    </script>
</body>
</html>
