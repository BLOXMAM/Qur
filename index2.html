<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستودع القرآن الكريم</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --header-height: 60px;
            --navbar-height: 60px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========================================== */
        /* تنسيقات الهيدر (Header Styles) */
        /* ========================================== */
        .app-header {
            background-color: var(--primary-color);
            color: #ffffff;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
        }

        /* شارة حالة الاتصال بالشبكة */
        .status-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        .online { background-color: #d4edda; color: #155724; }
        .offline { background-color: #f8d7da; color: #721c24; }

        /* ========================================== */
        /* تنسيقات القائمة الجانبية (Drawer Styles) */
        /* ========================================== */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: none;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background-color: var(--card-bg);
            z-index: 1002;
            transition: right 0.3s ease;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .drawer.open {
            right: 0;
        }

        .drawer-header {
            background-color: var(--primary-color);
            color: #ffffff;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .drawer-menu {
            list-style: none;
            padding: 10px 0;
            overflow-y: auto;
            flex: 1;
        }

        .drawer-item {
            padding: 15px 20px;
            border-bottom: 1px solid #e1e8ed;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-item:hover {
            background-color: #f5f6fa;
            color: var(--accent-color);
        }

        .drawer-item-icon {
            font-size: 16px;
        }

        /* ========================================== */
        /* تنسيقات شريط التنقل السفلي (Bottom Navbar) */
        /* ========================================== */
        .bottom-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--navbar-height);
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e1e8ed;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
            padding: 5px 0;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        /* ========================================== */
        /* منطقة المحتوى الرئيسي وديناميكية الكروت */
        /* ========================================== */
        .main-content {
            margin-top: var(--header-height);
            margin-bottom: var(--navbar-height);
            padding: 20px;
            flex: 1;
            width: 100%;
            max-width: 800px;
            align-self: center;
        }

        .pages-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            padding: 0;
            list-style: none;
            width: 100%;
        }

        .page-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e1e8ed;
            text-align: center;
        }

        .page-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .page-link {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin-bottom: 8px;
        }

        .page-link:hover {
            color: var(--accent-color);
        }

        .file-size {
            font-size: 12px;
            color: #95a5a6;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- 1. الهيدر ورأس الصفحة (Header Start) -->
    <!-- ========================================== -->
    <header class="app-header">
        <button class="menu-btn" onclick="toggleDrawer()">☰</button>
        <div class="header-title">فهرس المصحف</div>
        <!-- شارة حالة الشبكة مدمجة بأناقة في الهيدر -->
        <div id="networkStatus" class="status-badge online">فحص...</div>
    </header>
    <!-- ========================================== -->
    <!-- الهيدر ورأس الصفحة (Header End) -->
    <!-- ========================================== -->


    <!-- ========================================== -->
    <!-- 2. القائمة الجانبية (Drawer Start) -->
    <!-- ========================================== -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
    <nav class="drawer" id="drawer">
        <div class="drawer-header">تصفح سريع للصفحات</div>
        <ul class="drawer-menu" id="drawerDynamicMenu">
            <!-- سيتم إضافة الروابط تلقائياً وديناميكياً هنا أيضاً بجانب الكروت الرئيسية -->
        </ul>
    </nav>
    <!-- ========================================== -->
    <!-- القائمة الجانبية (Drawer End) -->
    <!-- ========================================== -->


    <!-- ========================================== -->
    <!-- 3. محتوى الصفحة الديناميكي (Main Content Start) -->
    <!-- ========================================== -->
    <main class="main-content">
        
        <!-- مؤشر التحميل الدوار -->
        <div id="loader" class="loader"></div>

        <!-- قائمة الكروت الديناميكية التي ستظهر وتختفي تلقائياً -->
        <ul id="pagesList" class="pages-list"></ul>

    </main>
    <!-- ========================================== -->
    <!-- محتوى الصفحة الديناميكي (Main Content End) -->
    <!-- ========================================== -->


    <!-- ========================================== -->
    <!-- 4. شريط التنقل السفلي (Bottom Navbar Start) -->
    <!-- ========================================== -->
    <nav class="bottom-navbar">
        <div class="nav-item active" onclick="selectNavItem(this); location.reload();">
            <span class="nav-icon">📖</span>
            <span>المصحف</span>
        </div>
        <div class="nav-item" onclick="selectNavItem(this); openPage('favorites.html')">
            <span class="nav-icon">⭐</span>
            <span>المفضلة</span>
        </div>
        <div class="nav-item" onclick="selectNavItem(this); openPage('settings.html')">
            <span class="nav-icon">⚙️</span>
            <span>الإعدادات</span>
        </div>
    </nav>
    <!-- ========================================== -->
    <!-- شريط التنقل السفلي (Bottom Navbar End) -->
    <!-- ========================================== -->


    <script>
        const username = "BLOXMAM";
        const repo = "Qur";

        // دالة تجميل أسماء الملفات وإزالة الامتدادات والرموز
        function formatTitle(fileName) {
            let nameWithoutExt = fileName.replace(".html", "");
            return nameWithoutExt.replace(/[-_]/g, " ");
        }

        // تحديث شارة حالة الاتصال بالإنترنت في الهيدر
        function updateStatusIndicator() {
            const statusBadge = document.getElementById("networkStatus");
            if (navigator.onLine) {
                statusBadge.textContent = "متصل";
                statusBadge.className = "status-badge online";
            } else {
                statusBadge.textContent = "أوفلاين";
                statusBadge.className = "status-badge offline";
            }
        }

        // دالة لعرض الكروت في المحتوى، والروابط في الـ Drawer بشكل ديناميكي كامل
        function renderContent(htmlFiles) {
            const pagesList = document.getElementById("pagesList");
            const drawerMenu = document.getElementById("drawerDynamicMenu");
            
            pagesList.innerHTML = ""; 
            drawerMenu.innerHTML = ""; // تنظيف القوائم أولاً

            if (htmlFiles.length === 0) {
                pagesList.innerHTML = "<li style='grid-column: 1/-1; text-align:center; color:#95a5a6;'>لا توجد صفحات متوفرة حالياً. جاري المزامنة...</li>";
                drawerMenu.innerHTML = "<li class='drawer-item' style='color:#95a5a6;'>لا توجد صفحات</li>";
                return;
            }

            htmlFiles.forEach(file => {
                const readableTitle = formatTitle(file.name);
                const sizeInKB = (file.size / 1024).toFixed(1);

                // 1. إضافة البطاقة الذكية في منطقة المحتوى الرئيسي
                const cardItem = document.createElement("li");
                cardItem.className = "page-card";
                cardItem.innerHTML = `
                    <a class="page-link" href="#" onclick="openPage('${file.name}'); return false;">${readableTitle}</a>
                    <span class="file-size">الحجم: ${sizeInKB} كيلوبايت</span>
                `;
                pagesList.appendChild(cardItem);

                // 2. إضافة نفس الصفحة كخيار سريع في القائمة الجانبية (Drawer)
                const drawerItem = document.createElement("li");
                drawerItem.className = "drawer-item";
                drawerItem.onclick = function() {
                    toggleDrawer(); // إغلاق القائمة الجانبية أولاً
                    openPage(file.name);
                };
                drawerItem.innerHTML = `
                    <span>${readableTitle}</span>
                    <span class="drawer-item-icon">📖</span>
                `;
                drawerMenu.appendChild(drawerItem);
            });
        }

        // الدالة الأساسية لتحميل وإدارة التخزين المؤقت والاتصال بالـ API
        async function initPage() {
            updateStatusIndicator();
            const loader = document.getElementById("loader");

            // 1. جلب البيانات من التخزين المحلي (الكاش) فوراً لسرعة فائقة
            const savedData = localStorage.getItem("github_pages_cache");
            if (savedData) {
                const cachedFiles = JSON.parse(savedData);
                renderContent(cachedFiles);
                loader.style.display = "none"; 
            }

            // 2. تحديث البيانات من خوادم GitHub إن وجد اتصال إنترنت
            if (navigator.onLine) {
                try {
                    const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents?ref=main`);
                    if (response.ok) {
                        const files = await response.json();
                        
                        // فلترة الملفات المسموح بظهورها ديناميكياً
                        const htmlFiles = files.filter(file => 
                            file.name.endsWith('.html') && 
                            file.name !== 'index.html' && 
                            file.name !== 'index1.html' && 
                            file.name !== 'index2.html'
                        );

                        // تحديث الكاش المحلي بالنسخة الجديدة
                        localStorage.setItem("github_pages_cache", JSON.stringify(htmlFiles));
                        
                        // إعادة عرض البيانات المحدثة
                        renderContent(htmlFiles);
                    }
                } catch (error) {
                    console.log("استخدام الكاش المحلي مؤقتاً بسبب مشكلة في جلب البيانات.");
                } finally {
                    loader.style.display = "none";
                }
            } else {
                loader.style.display = "none";
            }
        }

        // دالة فتح وإغلاق القائمة الجانبية (Drawer)
        function toggleDrawer() {
            const drawer = document.getElementById("drawer");
            const overlay = document.getElementById("drawerOverlay");
            
            if (drawer.classList.contains("open")) {
                drawer.classList.remove("open");
                overlay.style.display = "none";
            } else {
                drawer.classList.add("open");
                overlay.style.display = "block";
            }
        }

        // دالة التحكم في تبويبات الشريط السفلي
        function selectNavItem(element) {
            const items = document.querySelectorAll(".nav-item");
            items.forEach(item => item.classList.remove("active"));
            element.classList.add("active");
        }

        // دالة الربط مع الأندرويد لفتح الملفات أوفلاين وسحابياً بأمان
        function openPage(fileName) {
            if (window.Android && typeof window.Android.openLocalPage === 'function') {
                window.Android.openLocalPage(fileName);
            } else {
                window.location.href = fileName; 
            }
        }

        // مراقبة الاتصال الفوري بالإنترنت لتغيير الحالة مباشرة
        window.addEventListener('online', updateStatusIndicator);
        window.addEventListener('offline', updateStatusIndicator);

        window.onload = initPage;
    </script>
</body>
</html>
