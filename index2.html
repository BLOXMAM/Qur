<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فهرس صفحات القرآن الكريم</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 24px;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        /* قائمة الصفحات */
        .pages-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            padding: 0;
            list-style: none;
        }

        .page-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e1e8ed;
        }

        .page-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .page-link {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin-bottom: 8px;
        }

        .page-link:hover {
            color: var(--accent-color);
        }

        .file-size {
            font-size: 12px;
            color: #95a5a6;
        }

        /* مؤشر التحميل */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مستودع صفحات القرآن الكريم</h1>
        <p class="subtitle">يتم تحديث هذه القائمة تلقائياً من GitHub</p>

        <!-- مؤشر التحميل -->
        <div id="loader" class="loader"></div>

        <!-- حاوية عرض الصفحات -->
        <ul id="pagesList" class="pages-list"></ul>
        
        <div id="errorMessage" class="error-msg" style="display: none;">
            فشل جلب الصفحات. يرجى التحقق من اتصال الإنترنت.
        </div>
    </div>

    <script>
        // إعدادات المستودع الخاص بك
        const username = "BLOXMAM";
        const repo = "Qur";

        // دالة لتحويل اسم الملف إلى عنوان مقروء ومنسق
        function formatTitle(fileName) {
            // إزالة امتداد .html
            let nameWithoutExt = fileName.replace(".html", "");
            // استبدال الشُرط والشرطات السفلية بمسافات لتبدو منسقة
            return nameWithoutExt.replace(/[-_]/g, " ");
        }

        async function fetchGitHubPages() {
            const loader = document.getElementById("loader");
            const pagesList = document.getElementById("pagesList");
            const errorMsg = document.getElementById("errorMessage");

            try {
                // جلب قائمة الملفات من GitHub API لفرع main
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents?ref=main`);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const files = await response.json();
                
                // تصفية الملفات للحصول على ملفات الـ HTML فقط واستثناء الملف الرئيسي والمقترنات
                const htmlFiles = files.filter(file => 
                    file.name.endsWith('.html') && 
                    file.name !== 'index.html' && 
                    file.name !== 'index1.html' && 
                    file.name !== 'index2.html'
                );

                loader.style.display = "none";

                if (htmlFiles.length === 0) {
                    pagesList.innerHTML = "<li>لا توجد صفحات إضافية متوفرة حالياً.</li>";
                    return;
                }

                // بناء كروت العرض لكل صفحة
                htmlFiles.forEach(file => {
                    const listItem = document.createElement("li");
                    listItem.className = "page-card";

                    // رابط لعرض الصفحة مباشرة (باستخدام رابط الـ Raw الذي يترجمه تطبيقك الآن)
                    const rawUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/${file.name}`;
                    const readableTitle = formatTitle(file.name);
                    const sizeInKB = (file.size / 1024).toFixed(1);

                    listItem.innerHTML = `
                        <a class="page-link" href="${rawUrl}">${readableTitle}</a>
                        <span class="file-size">الحجم: ${sizeInKB} كيلوبايت</span>
                    `;
                    pagesList.appendChild(listItem);
                });

            } catch (error) {
                console.error("Error fetching files:", error);
                loader.style.display = "none";
                errorMsg.style.display = "block";
            }
        }

        // تشغيل الجلب عند تحميل الصفحة
        window.onload = fetchGitHubPages;
    </script>
</body>
</html>
