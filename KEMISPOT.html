<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMISPOT</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #18bc9c;
            --bg: #f5f6fa;
            --text: #333333;
            --card-bg: #ffffff;
            --border: #dcdde1;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--primary), #34495e);
            color: white;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
        }
        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 1rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .info-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>صفحة KEMISPOT</h1>
            <p>تم تكوينها بنجاح وهي جاهزة للاستخدام</p>
        </div>

        <div class="card">
            <h2>تفاصيل الصفحة الأساسية</h2>
            <div class="info-item">
                <span class="info-label">اسم الصفحة:</span>
                <span>KEMISPOT</span>
            </div>
            <div class="info-item">
                <span class="info-label">المستودع المرتبط:</span>
                <span>Qur</span>
            </div>
            <div class="info-item">
                <span class="info-label">حالة التزامن:</span>
                <span style="color: var(--accent); font-weight: bold;">متصل ومحمي ✓</span>
            </div>
        </div>
    </div>

</body>
</html>
