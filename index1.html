<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المتابعة لحفظ القرآن الكريم</title>
    
    <link rel="stylesheet" href="file:///android_asset/icons.css">
    <style>
        @font-face {
            font-family: 'Uthmani';
            src: url('file:///android_asset/uthmanic.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'Phosphor';
            src: url('file:///android_asset/Phosphor.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --header-bg: #1e3d33;
            --header-text: #ffffff;
            --accent-color: #16a085;
            --success-color: #27ae60;
            --very-good-color: #f1c40f;
            --warning-color: #e67e22;
            --danger-color: #c0392b;
            --border-color: #e2e8f0;
            --dialog-bg: #ffffff;
            --history-item-bg: #f8fafc;
            --student-bar-bg: #eaeded;
            --group-label-color: #16a085;
        }

        [data-theme="dark"] {
            --bg-color: #121824;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --header-bg: #0f172a;
            --header-text: #38bdf8;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --dialog-bg: #1e293b;
            --history-item-bg: #334155;
            --student-bar-bg: #1e293b;
            --group-label-color: #2980b9;
            --txt-c: #ffffff;
        }

        body {
            font-family: 'Amiri', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            transition: background-color 0.3s, color 0.3s;
        }

        .quran-font { font-family: 'Uthmani', 'Amiri', serif; }

        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto 15px auto;
            background: var(--header-bg);
            color: var(--header-text);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 8px; }

        .header-actions { 
            display: flex; 
            gap: 8px; 
            flex-wrap: wrap; 
            justify-content: center;
            width: 100%;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            white-space: nowrap;
            flex: 1 1 auto;
            max-width: 100%;
        }
        [data-theme="dark"] .btn { color: #0f172a; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background-color: #64748b; color: white !important; }
        .btn-danger { background-color: var(--danger-color); color: white !important; }
        .btn-info { background-color: #2980b9; color: white !important; }
        .btn-warning { background-color: var(--warning-color); color: white !important; }

        .student-management-bar {
            max-width: 1100px;
            margin: 0 auto 15px auto;
            background: var(--student-bar-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid var(--border-color);
        }

        .student-selector-zone {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .student-selector-zone label {
            font-weight: bold;
            white-space: nowrap;
            font-size: 15px;
        }

        .students-count-badge {
            background: var(--accent-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        select {
            padding: 10px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            outline: none;
            flex: 1 1 150px;
            min-width: 120px;
            font-family: inherit;
        }

        .student-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
        }

        .sections-tabs {
            max-width: 1100px;
            margin: 0 auto 15px auto;
            display: flex;
            gap: 6px;
        }

        .tab-btn {
            flex: 1;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: bold;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        [data-theme="dark"] .tab-btn.active { color: #0f172a; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 15px;
        }

        .juz-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
            border-right: 6px solid #cbd5e1;
        }

        .juz-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .juz-info { display: flex; flex-direction: column; gap: 4px; width: 65%; }
        .juz-number { font-size: 12px; color: #94a3b8; font-weight: bold; }
        .juz-name { font-weight: bold; font-size: 18px; line-height: 1.3; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; color: white !important; display: inline-block; text-align: center; white-space: nowrap; }
        .status-excellent { background-color: var(--success-color); }
        .status-very-good { background-color: var(--very-good-color); color: #000 !important; }
        .status-good { background-color: var(--warning-color); }
        .status-not-memorized { background-color: var(--danger-color); }
        .status-group-label { background-color: var(--group-label-color); }

        .juz-card.border-excellent { border-right-color: var(--success-color); }
        .juz-card.border-very-good { border-right-color: var(--very-good-color); }
        .juz-card.border-good { border-right-color: var(--warning-color); }
        .juz-card.border-not-memorized { border-right-color: var(--danger-color); }
        .juz-card.border-group-label { border-right-color: var(--group-label-color); }

        .last-score { font-size: 13px; color: #64748b; }
        [data-theme="dark"] .last-score { color: #94a3b8; }
        
        .confidence-level { font-size: 12px; font-weight: bold; margin-top: 2px; }
        
        .progress-text { font-size: 12px; font-weight: bold; margin-top: 2px; display: inline-flex; align-items: center; gap: 4px; }
        .prog-up-heavy { color: #27ae60; }
        .prog-up-medium { color: #1abc9c; }
        .prog-up-light { color: #2ecc71; }
        .prog-stable { color: #7f8c8d; }
        .prog-down-light { color: #e67e22; }
        .prog-down-medium { color: #d35400; }
        .prog-down-heavy { color: #c0392b; }

        /* أثماط كروت إحصائيات التقييم الجانبية */
        .eval-stat-card {
            display: inline-flex;
            flex-direction: column;
            min-width: 140px;
            max-width: 220px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            vertical-align: top;
            white-space: normal;
        }
        .eval-stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }
        .eval-stat-card.active-filter {
            border: 2px solid var(--accent-color);
            background: rgba(22, 160, 133, 0.12);
        }
        .eval-stat-score {
            font-weight: bold;
            font-size: 16px;
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        .eval-stat-item {
            font-size: 12px;
            padding: 3px 0;
            border-bottom: 1px dashed var(--border-color);
            color: var(--text-color);
        }
        .eval-stat-item:last-child {
            border-bottom: none;
        }

        dialog {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            padding: 20px;
            width: 95%;
            max-width: 450px;
            background: var(--dialog-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        dialog::backdrop { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
        dialog h2 { margin-top: 0; color: var(--accent-color); font-size: 20px; display: flex; align-items: center; gap: 6px; }

        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .dialog-actions .btn { flex: 1 1 auto; }

        .history-section { margin-top: 20px; max-height: 250px; overflow-y: auto; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .history-section h3 { display: flex; align-items: center; gap: 6px; font-size: 16px; margin-bottom: 10px; }
        .history-item {
            background: var(--history-item-bg);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent-color);
            border: 1px solid var(--border-color);
        }

        .no-students-alert {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            font-size: 16px;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .page-input-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            align-items: center;
        }

        @media (min-width: 768px) {
            body { padding: 20px; }
            header { flex-direction: row; padding: 15px 25px; text-align: right; }
            h1 { font-size: 24px; }
            .header-actions { width: auto; justify-content: flex-end; }
            .btn { flex: 0 1 auto; font-size: 15px; }
            .student-management-bar { flex-direction: row; justify-content: space-between; align-items: center; }
            .student-selector-zone { width: auto; }
            .student-actions { width: auto; }
            select { min-width: 200px; }
            dialog { padding: 25px; width: 90%; }
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="ph ph-book-open"></i> سجل المتابعة لحفظ القرآن</h1>
        <div class="header-actions">
            <button class="btn btn-info" onclick="exportData()"><i class="ph ph-download-simple"></i> تصدير نسخة احتياطية</button>
            <button class="btn btn-info" onclick="triggerImport()"><i class="ph ph-upload-simple"></i> استيراد نسخة احتياطية</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;" onchange="importData(event)">
            
            <button class="btn btn-secondary" id="sortBtn" onclick="toggleSortOrder()"><i class="ph ph-sort-ascending"></i> ترتيب: تصاعدي</button>
            <button class="btn btn-secondary" id="themeBtn" onclick="toggleTheme()"><i class="ph ph-moon"></i> مظهر داكن</button>
            <button class="btn" onclick="openSettings()"><i class="ph ph-gear"></i> الإعدادات والحلقات</button>
        </div>
    </header>

    <div class="student-management-bar">
        <div class="student-selector-zone">
            <label>اختر الطالب:</label>
            <select id="studentSelect" onchange="onStudentChanged()">
            </select>
            <span class="students-count-badge" id="studentsCountBadge">العدد: 0</span>
        </div>
        <div class="student-actions">
            <button class="btn btn-secondary" onclick="renameStudent()"><i class="ph ph-pencil-simple"></i> تعديل الاسم</button>
            <button class="btn btn-danger" onclick="deleteStudent()"><i class="ph ph-trash"></i> حذف الطالب</button>
            <button class="btn" style="background-color: #27ae60;" onclick="addNewStudent()"><i class="ph ph-plus"></i> إضافة طالب</button>
        </div>
    </div>

    <div class="sections-tabs">
        <button class="tab-btn active" id="tabAjza" onclick="switchTab('ajza')">الأجزاء</button>
        <button class="tab-btn" id="tabAhzab" onclick="switchTab('ahzab')">الأحزاب</button>
        <button class="tab-btn" id="tabSuwar" onclick="switchTab('suwar')">السور</button>
    </div>

    <div style="max-width:1100px; margin: 0 auto 15px auto; display:none;" id="groupEvalContainer">
        <button class="btn" style="color: #ffffff; background-color: var(--group-label-color); width:100%;" onclick="openGroupEvaluation()"><i class="ph ph-plus"></i> تسميع مجموعة مخصص</button>
    </div>

    <div style="max-width:1100px; margin: 0 auto 15px auto;" id="evalStatsWrapper">
        <button class="btn btn-secondary" id="evalStatsToggleBtn" onclick="toggleEvalStats()" style="width:100%;">
            <i class="ph ph-chart-bar"></i> إحصائيات التقييم (الأقل حفظاً)
        </button>
        <div id="evalStatsCardsContainer" style="display:none; overflow-x:auto; overflow-y:hidden; white-space:nowrap; gap:12px; padding:12px 4px 8px 4px; border-radius:10px; margin-top:10px; background:var(--student-bar-bg); border:1px solid var(--border-color); -webkit-overflow-scrolling: touch;">
        </div>
    </div>

    <div class="container" id="juzContainer">
    </div>

    <dialog id="settingsDialog">
        <h2><i class="ph ph-gear"></i> إعدادات خصم درجات التقييم</h2>
        <div class="form-group">
            <label for="errorDeduction">الخصم لكل خطأ واحد (درجة):</label>
            <input type="number" id="errorDeduction" step="0.1" min="0" value="1.0">
        </div>
        <div class="form-group">
            <label for="doubtDeduction">الخصم لكل شكين (درجة):</label>
            <input type="number" id="doubtDeduction" step="0.1" min="0" value="1.0">
        </div>
        <div class="form-group">
            <label for="tajweedDeduction">الخصم لكل خطأ تجويد (درجة):</label>
            <input type="number" id="tajweedDeduction" step="0.05" min="0" value="0.25">
        </div>
        <div class="form-group">
            <label for="confidenceDeduction">خصم مستوى الثقة لكل تردد واحد (%):</label>
            <input type="number" id="confidenceDeduction" step="1" min="0" max="100" value="5">
        </div>
        
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">
        <h3><i class="ph ph-users-three"></i> إدارة الحلقات</h3>
        
        <div class="form-group">
            <label for="groupSelect">الحلقة الحالية النشطة:</label>
            <select id="groupSelect" onchange="onGroupChanged()" style="width: 100%; box-sizing: border-box;"></select>
        </div>

        <div class="dialog-actions" style="margin-top: 10px; justify-content: flex-start;">
            <button class="btn" style="background-color: #27ae60;" onclick="addNewGroup()"><i class="ph ph-plus"></i> إضافة حلقة</button>
            <button class="btn btn-secondary" onclick="renameGroup()"><i class="ph ph-pencil-simple"></i> تغيير الاسم</button>
            <button class="btn btn-danger" onclick="deleteGroup()"><i class="ph ph-trash"></i> حذف الحلقة</button>
        </div>

        <div class="dialog-actions">
            <button class="btn btn-secondary" onclick="closeDialog('settingsDialog')">إلغاء</button>
            <button class="btn" onclick="saveSettings()">حفظ الإعدادات</button>
        </div>
    </dialog>

    <dialog id="evaluationDialog">
        <h2><i class="ph ph-note-pencil"></i> <span id="evalDialogTitle" class="quran-font">تقييم الحفظ</span></h2>
        
        <div id="surahVersesBlock" style="display: none; border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; margin-bottom: 12px; background: var(--history-item-bg);">
            <div class="form-group">
                <label for="surahScopeType">نطاق التسميع:</label>
                <select id="surahScopeType" onchange="onSurahScopeTypeChanged()">
                    <option value="all">سورة كاملة</option>
                    <option value="verses">تحديد آيات</option>
                </select>
            </div>
            <div id="versesPickers" style="display: none; gap: 10px; margin-top: 10px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="verseStart">من آية:</label>
                    <select id="verseStart" onchange="onVerseStartChanged()"></select> 
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="verseEnd">إلى آية:</label>
                    <select id="verseEnd"></select> 
                </div>
            </div>

            <div style="margin-top: 12px; border-top: 1px dashed var(--border-color); padding-top: 8px;">
                <label style="font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="enableProblemPages" onchange="toggleProblemPages()">
                    تحديد الصفحات التي بها إشكال
                </label>
                <div id="problemPagesContainer" style="display: none; margin-top: 8px;">
                    <div id="problemPagesList"></div>
                    <button type="button" class="btn btn-secondary" onclick="addProblemPageField()" style="padding: 4px 10px; font-size: 12px; margin-top: 4px;">
                        <i class="ph ph-plus"></i> إضافة صفحة أخرى
                    </button>
                </div>
            </div>
        </div>

        <div id="juzAhzabScopeBlock" style="display: none; border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; margin-bottom: 12px; background: var(--history-item-bg);">
            <div class="form-group">
                <label for="juzAhzabScopeType">نطاق التسميع:</label>
                <select id="juzAhzabScopeType" onchange="onJuzAhzabScopeTypeChanged()">
                    <option value="all">تسميع كامل</option>
                    <option value="unmemorized">تحديد سور "لم تُحفظ" </option>
                </select>
            </div>
            <div id="unmemorizedSurahsPicker" style="display: none; margin-top: 10px;" class="form-group">
                <label for="unmemorizedSurahs">سور غير محفوظة:</label>
                <select id="unmemorizedSurahs" multiple style="height: 100px;"></select>
            </div>

            <div style="margin-top: 12px; border-top: 1px dashed var(--border-color); padding-top: 8px;">
                <label style="font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="enableJuzProblemSurahs" onchange="toggleJuzProblemSurahs()">
                    تحديد سور بها إشكال
                </label>
                <div id="juzProblemSurahsContainer" style="display: none; margin-top: 8px;">
                    <select id="juzProblemSurahsSelect" multiple style="height: 90px; width:100%;"></select>
                </div>
            </div>
        </div>

        <div style="border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; margin-bottom: 12px; background: var(--history-item-bg);">
            <label style="font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" id="enablePreviousDate" onchange="togglePreviousDate()">
                تسميع سابق (تعديل التاريخ)
            </label>
            <div id="previousDateBlock" style="display: none; margin-top: 8px;" class="form-group">
                <label for="customEvalDate">تاريخ التسميع:</label>
                <input type="date" id="customEvalDate">
            </div>
        </div>

        <div class="form-group">
            <label for="errorsCount">عدد الأخطاء:</label>
            <input type="number" id="errorsCount" min="0" value="0">
        </div>
        <div class="form-group">
            <label for="doubtsCount">عدد الشكوك:</label>
            <input type="number" id="doubtsCount" min="0" value="0">
        </div>
        <div class="form-group">
            <label for="hesitationsCount">عدد الترددات:</label>
            <input type="number" id="hesitationsCount" min="0" value="0">
        </div>
        <div class="form-group">
            <label for="tajweedCount">أخطاء التجويد:</label>
            <input type="number" id="tajweedCount" min="0" value="0">
        </div>

        <div class="dialog-actions">
            <button class="btn btn-secondary" onclick="closeDialog('evaluationDialog')">إغلاق</button>
            <button class="btn" id="btnSaveEval" onclick="saveEvaluation()">تسجيل المحاولة</button>
        </div>

        <div class="history-section">
            <h3><i class="ph ph-scroll"></i> سجل المحاولات (الأحدث أولاً):</h3>
            <div id="historyList"></div>
        </div>
    </dialog>

    <dialog id="groupEvaluationDialog">
        <h2><i class="ph ph-note-pencil"></i> تسميع مجموعة مخصص</h2>
        <div class="form-group">
            <label for="groupSurahStart">من سورة:</label>
            <select id="groupSurahStart" onchange="onGroupSurahsRangeChanged()"></select>
        </div>
        <div class="form-group">

        function areSurahsArraysEqual(a, b) {
            if (!a && !b) return true;
            if (!a || !b) return false;
            if (a.length !== b.length) return false;
            const sortedA = [...a].sort();
            const sortedB = [...b].sort();
            return sortedA.every((val, index) => val === sortedB[index]);
        }

        function calculateProgressHTML(attempts) {
            if (!attempts || attempts.length === 0) return '';
            
            const currentAttempt = attempts[attempts.length - 1];
            
            let previousAttempt = null;
            let relationType = 'same'; 

            if (currentSelectedTab === 'suwar') {
                const currentType = currentAttempt.scopeType || 'all';
                for (let i = attempts.length - 2; i >= 0; i--) {
                    const att = attempts[i];
                    const attType = att.scopeType || 'all';
                    if (currentType === 'verses' && attType === 'verses') {
                        if (currentAttempt.verseStart === att.verseStart && currentAttempt.verseEnd === att.verseEnd) {
                            previousAttempt = att;
                            break;
                        }
                    } else if (currentType === 'all' && attType === 'all') {
                        previousAttempt = att;
                        break;
                    }
                }
            } else {
                const currentType = currentAttempt.scopeType || 'all';
                for (let i = attempts.length - 2; i >= 0; i--) {
                    const att = attempts[i];
                    const attType = att.scopeType || 'all';

                    if (currentType === 'all' && attType === 'all') {
                        previousAttempt = att;
                        break;
                    } else if (currentType === 'unmemorized' && attType === 'unmemorized') {
                        if (areSurahsArraysEqual(currentAttempt.unmemorizedSurahs, att.unmemorizedSurahs)) {
                            previousAttempt = att;
                            break;
                        }
                    } else if (attType === 'unmemorized' && currentType === 'all') {
                        previousAttempt = att;
                        relationType = 'toAll'; 
                        break;
                    } else if (attType === 'all' && currentType === 'unmemorized') {
                        previousAttempt = att;
                        relationType = 'toUnmemorized'; 
                        break;
                    }
                }
            }

            if (!previousAttempt) {
                return '<span class="progress-text" style="color:#aaa; font-weight:normal;">(لا مقارنات عادلة متوفرة)</span>';
            }

            let currentScoreForCalc = currentAttempt.score;
            let previousScoreForCalc = previousAttempt.score;

            if (currentSelectedTab === 'suwar' && currentAttempt.scopeType === 'verses') {
                const vCount = (currentAttempt.verseEnd - currentAttempt.verseStart) + 1;
                const errors = currentAttempt.errors || 0;
                const doubts = currentAttempt.doubts || 0;
                const tajweed = currentAttempt.tajweedErrors || 0;

                let deduction = errors * settings.errorDeduction;
                deduction += (doubts / 2) * settings.doubtDeduction;
                deduction += tajweed * (settings.tajweedDeduction || 0.25);

                const totalVerses = surahVersesCount[currentSelectedIndex - 1] || 100;
                const fullProportionalScore = 10 - (deduction * (totalVerses / vCount));
                currentScoreForCalc = Math.max(0, Math.round(fullProportionalScore * 10) / 10);
            }

            if (currentSelectedTab === 'suwar' && previousAttempt.scopeType === 'verses') {
                const vCount = (previousAttempt.verseEnd - previousAttempt.verseStart) + 1;
                const errors = previousAttempt.errors || 0;
                const doubts = previousAttempt.doubts || 0;
                const tajweed = previousAttempt.tajweedErrors || 0;

                let deduction = errors * settings.errorDeduction;
                deduction += (doubts / 2) * settings.doubtDeduction;
                deduction += tajweed * (settings.tajweedDeduction || 0.25);

                const totalVerses = surahVersesCount[currentSelectedIndex - 1] || 100;
                const fullProportionalScore = 10 - (deduction * (totalVerses / vCount));
                previousScoreForCalc = Math.max(0, Math.round(fullProportionalScore * 10) / 10);
            }

            if (relationType === 'toAll') {
                const totalInJuz = currentSelectedTab === 'ahzab' ? 
                    (ahzabSurahsMapping[currentSelectedIndex] ? ahzabSurahsMapping[currentSelectedIndex].length : 1) : 
                    (ajzaSurahsMapping[currentSelectedIndex] ? ajzaSurahsMapping[currentSelectedIndex].length : 1);
                
                const unmemCount = previousAttempt.unmemorizedSurahs ? previousAttempt.unmemorizedSurahs.length : 0;
                const prevTestedCount = Math.max(1, totalInJuz - unmemCount);
                
                const prevErrors = previousAttempt.errors || 0;
                const prevDoubts = previousAttempt.doubts || 0;
                const prevTajweed = previousAttempt.tajweedErrors || 0;
                let prevDed = prevErrors * settings.errorDeduction + (prevDoubts / 2) * settings.doubtDeduction + prevTajweed * (settings.tajweedDeduction || 0.25);
                
                const normalizedPrevScore = 10 - (prevDed * (totalInJuz / prevTestedCount));
                previousScoreForCalc = Math.max(0, Math.round(normalizedPrevScore * 10) / 10);
            }

            if (relationType === 'toUnmemorized') {
                const totalInJuz = currentSelectedTab === 'ahzab' ? 
                    (ahzabSurahsMapping[currentSelectedIndex] ? ahzabSurahsMapping[currentSelectedIndex].length : 1) : 
                    (ajzaSurahsMapping[currentSelectedIndex] ? ajzaSurahsMapping[currentSelectedIndex].length : 1);
                
                const unmemCount = currentAttempt.unmemorizedSurahs ? currentAttempt.unmemorizedSurahs.length : 0;
                const curTestedCount = Math.max(1, totalInJuz - unmemCount);
                
                const curErrors = currentAttempt.errors || 0;
                const curDoubts = currentAttempt.doubts || 0;
                const curTajweed = currentAttempt.tajweedErrors || 0;
                let curDed = curErrors * settings.errorDeduction + (curDoubts / 2) * settings.doubtDeduction + curTajweed * (settings.tajweedDeduction || 0.25);
                
                const normalizedCurScore = 10 - (curDed * (totalInJuz / curTestedCount));
                currentScoreForCalc = Math.max(0, Math.round(normalizedCurScore * 10) / 10);
            }

            const diff = Math.round((currentScoreForCalc - previousScoreForCalc) * 10) / 10;

            if (diff > 0) {
                if (diff >= 2.0) {
                    return `<span class="progress-text prog-up-heavy"><i class="ph ph-trend-up"></i> ارتفاع ممتاز (+${diff})</span>`;
                } else if (diff >= 1.0) {
                    return `<span class="progress-text prog-up-medium"><i class="ph ph-trend-up"></i> تحسن جيد جداً (+${diff})</span>`;
                } else {
                    return `<span class="progress-text prog-up-light"><i class="ph ph-trend-up"></i> تحسن طفيف (+${diff})</span>`;
                }
            } else if (diff < 0) {
                const absDiff = Math.abs(diff);
                if (absDiff >= 2.0) {
                    return `<span class="progress-text prog-down-heavy"><i class="ph ph-trend-down"></i> تراجع كبير (-${absDiff})</span>`;
                } else if (absDiff >= 1.0) {
                    return `<span class="progress-text prog-down-medium"><i class="ph ph-trend-down"></i> تراجع متوسط (-${absDiff})</span>`;
                } else {
                    return `<span class="progress-text prog-down-light"><i class="ph ph-trend-down"></i> تراجع طفيف (-${absDiff})</span>`;
                }
            } else {
                return `<span class="progress-text prog-stable"><i class="ph ph-minus"></i> مستوى أداء مستقر (0)</span>`;
            }
        }

            } else {
                targetData = student.ajzaData || {};

            }

            const scoreMap = {};

            for (let i = 1; i <= totalCount; i++) {
                const attempts = targetData[i];
                if (attempts && attempts.length > 0) {
                    const lastAttempt = attempts[attempts.length - 1];
                    if (lastAttempt && typeof lastAttempt.score === 'number') {
                        const score = lastAttempt.score;
                        if (!scoreMap[score]) {
                            scoreMap[score] = [];
                        }
                        scoreMap[score].push({
                            index: i,
                            name: `${prefixLabel} ${namesArray[i - 1]}`
                        });
                    }
                }
            }

            const scores = Object.keys(scoreMap).map(Number).sort((a, b) => a - b);

            if (scores.length === 0) {
                container.innerHTML = '<div style="font-size:13px; color:#94a3b8; padding:8px; white-space:normal;">لا توجد تقييمات مسجلة بعد في هذا القسم.</div>';
                return;
            }

            scores.forEach(score => {
                const items = scoreMap[score];
                const card = document.createElement('div');
                card.className = 'eval-stat-card' + (selectedScoreFilter === score ? ' active-filter' : '');
                
                let itemsHTML = items.map(it => `<div class="eval-stat-item">${it.name}</div>`).join('');
                
                card.innerHTML = `
                    <div class="eval-stat-score">${score}/10</div>
                    <div style="max-height:100px; overflow-y:auto; width:100%;">${itemsHTML}</div>
                `;

                card.onclick = () => {
                    if (selectedScoreFilter === score) {
                        selectedScoreFilter = null;
                    } else {
                        selectedScoreFilter = score;
                    }
                    renderEvalStats();
                    renderList();
                };

                container.appendChild(card);
            });
        }

        function renderList() {
            const container = document.getElementById('juzContainer');
            container.innerHTML = '';

                container.innerHTML = '<div class="no-students-alert"><i class="ph ph-warning"></i> لا يوجد طلاب مضافون حالياً في هذه الحلقة. يرجى الضغط على "إضافة طالب" للبدء.</div>';

            }

            let targetData, namesArray, totalCount, prefixLabel;

            if (currentSelectedTab === 'ahzab') {
                targetData = student.data;
                namesArray = juzNames;
                totalCount = 60;
                prefixLabel = "الحزب";
            } else if (currentSelectedTab === 'suwar') {
                targetData = student.surahData;
                namesArray = surahNames;
                totalCount = 114;
                prefixLabel = "سورة";
            } else {
                targetData = student.ajzaData;
                namesArray = ajzaNames;
                totalCount = 30;
                prefixLabel = "الجزء";
            }

            let indexes = [];
            for (let i = 1; i <= totalCount; i++) indexes.push(i);

            if (sortOrder === 'desc') indexes.reverse();

            indexes.forEach(i => {
                const attempts = targetData[i] || [];
                const hasAttempts = attempts.length > 0;
                const lastAttempt = hasAttempts ? attempts[attempts.length - 1] : null;

                // التصفية عبر كروت إحصائيات التقييم إن وُجدت
                if (selectedScoreFilter !== null) {
                    if (!lastAttempt || lastAttempt.score !== selectedScoreFilter) {
                        return;
                    }
                }

                const card = document.createElement('div');
                card.className = 'juz-card';
                card.onclick = () => openEvaluation(i);

                let badgeHTML = '';
                let borderClass = '';
                let scoreText = '';
                let confidenceSectionHTML = '';
                let scopeBadge = '';
                let progressHTML = '';

                if (hasAttempts) {
                    const score = lastAttempt.score;
                    scoreText = `${score} / 10`;

                    if (lastAttempt.isGroupEval) {
                        badgeHTML = `<span class="status-badge status-group-label">تسميع مجموعة</span>`;
                        borderClass = 'border-group-label';
                        
                        let groupAddons = '';
                        if (lastAttempt.unmemorizedSurahs && lastAttempt.unmemorizedSurahs.length > 0) {
                            groupAddons += `<div style="color: var(--danger-color); font-weight: bold; font-size: 11px;">لم تُحفظ: ${lastAttempt.unmemorizedSurahs.join('، ')}</div>`;
                        }
                        if (lastAttempt.problemSurahs && lastAttempt.problemSurahs.length > 0) {
                            groupAddons += `<div style="color: var(--warning-color); font-weight: bold; font-size: 11px;">إشكال: ${lastAttempt.problemSurahs.join('، ')}</div>`;
                        }

                        confidenceSectionHTML = `<div class="confidence-level" style="color: #27ae60;"><i class="ph ph-shield-check"></i> تسميع مجموعة</div>${groupAddons}`;
                        progressHTML = '';
                    } else {
                        const hesitations = lastAttempt.hesitations || 0;
                        const deductionPerHesitation = settings.confidenceDeduction !== undefined ? settings.confidenceDeduction : 5;
                        let confidenceScore = 100 - (hesitations * deductionPerHesitation);
                        if (confidenceScore < 0) confidenceScore = 0;

                        let confidenceColor = '#27ae60';
                        if (confidenceScore >= 75 && confidenceScore <= 100) {
                            confidenceColor = '#27ae60';
                        } else if (confidenceScore >= 50 && confidenceScore < 75) {
                            confidenceColor = '#f1c40f';
                        } else if (confidenceScore >= 25 && confidenceScore < 50) {
                            confidenceColor = '#e67e22';
                        } else {
                            confidenceColor = '#c0392b';
                        }

                        if (score > 9) {
                            badgeHTML = `<span class="status-badge status-excellent">ممتاز</span>`;
                            borderClass = 'border-excellent';
                        } else if (score >= 8.5) {
                            badgeHTML = `<span class="status-badge status-very-good">جيد جداً</span>`;
                            borderClass = 'border-very-good';
                        } else if (score >= 7) {
                            badgeHTML = `<span class="status-badge status-good">جيد</span>`;
                            borderClass = 'border-good';
                        } else {
                            badgeHTML = `<span class="status-badge status-not-memorized">ضعيف</span>`;
                            borderClass = 'border-not-memorized';
                        }

                        let addonsHTML = '';
                        if (currentSelectedTab === 'suwar' && lastAttempt.problemPages && lastAttempt.problemPages.length > 0) {
                            const pagesStr = lastAttempt.problemPages.map(p => `ص${p.page}`).join('، ');
                            addonsHTML += `<div style="color: var(--warning-color); font-weight: bold; font-size: 11px;">صفحات بها إشكال: ${pagesStr}</div>`;
                        }
                        if ((currentSelectedTab === 'ajza' || currentSelectedTab === 'ahzab') && lastAttempt.problemSurahs && lastAttempt.problemSurahs.length > 0) {
                            const surahsStr = lastAttempt.problemSurahs.join('، ');
                            addonsHTML += `<div style="color: var(--warning-color); font-weight: bold; font-size: 11px;">سور بها إشكال: ${surahsStr}</div>`;
                        }

                        confidenceSectionHTML = `
                            <div class="confidence-level" style="color: ${confidenceColor};">
                                <i class="ph ph-shield-check"></i> نسبة الثقة: ${confidenceScore}%
                            </div>
                            ${addonsHTML}
                        `;

                        progressHTML = calculateProgressHTML(attempts);
                    }

                    if (currentSelectedTab === 'suwar' && lastAttempt.scopeType === 'verses') {
                        scopeBadge = `<span style="font-size:11px; color:var(--accent-color); font-weight:bold;">(آية ${lastAttempt.verseStart} - ${lastAttempt.verseEnd})</span>`;
                    } else if ((currentSelectedTab === 'ajza' || currentSelectedTab === 'ahzab') && lastAttempt.scopeType === 'unmemorized' && lastAttempt.unmemorizedSurahs && lastAttempt.unmemorizedSurahs.length > 0) {
                        scopeBadge = `<div style="font-size:11px; color:var(--danger-color); font-weight:bold;">لم تُحفظ: ${lastAttempt.unmemorizedSurahs.join('، ')}</div>`;
                    }
                } else {
                    badgeHTML = `<span class="status-badge status-not-memorized">لم يُسمّع</span>`;
                    borderClass = 'border-not-memorized';
                    scoreText = 'غير مقيم';
                    confidenceSectionHTML = `<div class="confidence-level" style="color: #94a3b8;">نسبة الثقة: --</div>`;
                    progressHTML = '';
                }

                card.classList.add(borderClass);

                const numberLabel = currentSelectedTab === 'suwar' ? `السورة ${i}` : (currentSelectedTab === 'ahzab' ? `الحزب ${i}` : `الجزء ${i}`);

                card.innerHTML = `
                    <div class="juz-info">
                        <span class="juz-number">${numberLabel}</span>
                        <span class="juz-name quran-font">${namesArray[i-1]}</span>
                        ${scopeBadge}
                        <span class="last-score">آخر تقييم: <strong>${scoreText}</strong></span>
                        ${confidenceSectionHTML}
                        ${progressHTML}
                    </div>
                    <div>
                        ${badgeHTML}
                    </div>
                `;

                container.appendChild(card);
            });
        }

            document.getElementById('errorsCount').value = attempt.errors || 0;
            document.getElementById('doubtsCount').value = attempt.doubts || 0;
            document.getElementById('hesitationsCount').value = attempt.hesitations || 0;
            document.getElementById('tajweedCount').value = attempt.tajweedErrors || 0;

            if (currentSelectedTab === 'suwar') {
                const scopeType = attempt.scopeType || 'all';
                document.getElementById('surahScopeType').value = scopeType;
                onSurahScopeTypeChanged();
                if (scopeType === 'verses') {
                    document.getElementById('verseStart').value = attempt.verseStart || 1;
                    onVerseStartChanged();
                    document.getElementById('verseEnd').value = attempt.verseEnd || 1;
                }
                if (attempt.problemPages && attempt.problemPages.length > 0) {
                    document.getElementById('enableProblemPages').checked = true;
                    document.getElementById('problemPagesContainer').style.display = 'block';
                    const list = document.getElementById('problemPagesList');
                    list.innerHTML = '';
                    attempt.problemPages.forEach(p => {
                        addProblemPageField(p.page, p.count);
                    });
                }
            } else {
                const scopeType = attempt.scopeType || 'all';
                document.getElementById('juzAhzabScopeType').value = scopeType;
                onJuzAhzabScopeTypeChanged();
                if (scopeType === 'unmemorized' && attempt.unmemorizedSurahs) {
                    const multiSelect = document.getElementById('unmemorizedSurahs');
                    Array.from(multiSelect.options).forEach(opt => {
                        opt.selected = attempt.unmemorizedSurahs.includes(opt.value);
                    });
                }
                if (attempt.problemSurahs && attempt.problemSurahs.length > 0) {
                    document.getElementById('enableJuzProblemSurahs').checked = true;
                    document.getElementById('juzProblemSurahsContainer').style.display = 'block';
                    const multiProb = document.getElementById('juzProblemSurahsSelect');
                    Array.from(multiProb.options).forEach(opt => {
                        opt.selected = attempt.problemSurahs.includes(opt.value);
                    });
                }
            }

            if (attempt.date) {
                document.getElementById('enablePreviousDate').checked = true;
                togglePreviousDate();
            }
        }

        function openGroupEvaluation() {
            if (!currentStudentId || studentsList.length === 0) {
                alert("يرجى اختيار طالب أولاً.");
                return;
            }
            document.getElementById('groupErrorsCount').value = 0;
            document.getElementById('groupDoubtsCount').value = 0;
            document.getElementById('groupHesitationsCount').value = 0;
            document.getElementById('groupTajweedCount').value = 0;
            document.getElementById('enableGroupUnmemorized').checked = false;
            document.getElementById('groupUnmemorizedContainer').style.display = 'none';
            document.getElementById('enableGroupProblemSurahs').checked = false;
            document.getElementById('groupProblemSurahsContainer').style.display = 'none';

            onGroupSurahsRangeChanged();
            renderGroupHistory();
            document.getElementById('groupEvaluationDialog').showModal();
        }

        function setupGroupSurahsDropdowns() {
            const startSelect = document.getElementById('groupSurahStart');
            const endSelect = document.getElementById('groupSurahEnd');
            startSelect.innerHTML = '';
            endSelect.innerHTML = '';

            surahNames.forEach((name, idx) => {
                const opt1 = document.createElement('option');
                opt1.value = idx + 1;
                opt1.innerText = `${idx + 1}. سورة ${name}`;
                startSelect.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = idx + 1;
                opt2.innerText = `${idx + 1}. سورة ${name}`;
                endSelect.appendChild(opt2);
            });
            startSelect.value = 1;
            endSelect.value = 114;
        }

        function onGroupSurahsRangeChanged() {
            const startVal = parseInt(document.getElementById('groupSurahStart').value) || 1;
            const endVal = parseInt(document.getElementById('groupSurahEnd').value) || 114;

            const minS = Math.min(startVal, endVal);
            const maxS = Math.max(startVal, endVal);

            const unmemSelect = document.getElementById('groupUnmemorizedSelect');
            const probSelect = document.getElementById('groupProblemSurahsSelect');
            unmemSelect.innerHTML = '';
            probSelect.innerHTML = '';

            for (let i = minS; i <= maxS; i++) {
                const sName = surahNames[i - 1];
                const opt1 = document.createElement('option');
                opt1.value = sName;
                opt1.innerText = sName;
                unmemSelect.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = sName;
                opt2.innerText = sName;
                probSelect.appendChild(opt2);
            }
        }

        function addProblemPageField(pageVal = '', countVal = 1) {
            const list = document.getElementById('problemPagesList');
            const row = document.createElement('div');
            row.className = 'page-input-row';
            row.innerHTML = `
                <input type="number" placeholder="رقم الصفحة" class="prob-page-num" min="1" max="604" value="${pageVal}" style="flex:1;">
                <input type="number" placeholder="الأخطاء" class="prob-page-count" min="1" value="${countVal}" style="width:70px;">
                <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()" style="padding:4px 8px;"><i class="ph ph-x"></i></button>
            `;
            list.appendChild(row);
        }

        function onVerseStartChanged() {
            const startSelect = document.getElementById('verseStart');
            const endSelect = document.getElementById('verseEnd');
            const startVal = parseInt(startSelect.value);
            const totalVerses = surahVersesCount[currentSelectedIndex - 1];

            const currentEndVal = parseInt(endSelect.value);
            endSelect.innerHTML = '';
            for (let v = startVal; v <= totalVerses; v++) {
                const opt = document.createElement('option');
                opt.value = v;
                opt.innerText = v;
                endSelect.appendChild(opt);
            }
            if (currentEndVal >= startVal && currentEndVal <= totalVerses) {
                endSelect.value = currentEndVal;
            }
        }

        function saveEvaluation() {
            const errors = parseInt(document.getElementById('errorsCount').value) || 0;
            const doubts = parseInt(document.getElementById('doubtsCount').value) || 0;
            const hesitations = parseInt(document.getElementById('hesitationsCount').value) || 0;
            const tajweedErrors = parseInt(document.getElementById('tajweedCount').value) || 0;

            let totalDeduction = errors * settings.errorDeduction;
            totalDeduction += (doubts / 2) * settings.doubtDeduction;
            totalDeduction += tajweedErrors * (settings.tajweedDeduction || 0.25);

            let finalScore = 10 - totalDeduction;
            if (finalScore < 0) finalScore = 0;
            finalScore = Math.round(finalScore * 10) / 10;

            const student = studentsList.find(s => s.id === currentStudentId);
            if (!student.data) student.data = {};
            if (!student.surahData) student.surahData = {};
            if (!student.ajzaData) student.ajzaData = {};

            let targetData = currentSelectedTab === 'ahzab' ? student.data : (currentSelectedTab === 'suwar' ? student.surahData : student.ajzaData);

            if (!targetData[currentSelectedIndex]) {
                targetData[currentSelectedIndex] = [];
            }

            let attemptDate = new Date().toLocaleDateString('ar-SA');
            if (document.getElementById('enablePreviousDate').checked) {
                const customDate = document.getElementById('customEvalDate').value;
                if (customDate) {
                    attemptDate = customDate;
                }
            }

            const attempt = {
                score: finalScore,
                errors: errors,
                doubts: doubts,
                hesitations: hesitations,
                tajweedErrors: tajweedErrors,
                date: attemptDate
            };

            if (currentSelectedTab === 'suwar') {
                const scopeType = document.getElementById('surahScopeType').value;
                attempt.scopeType = scopeType;
                if (scopeType === 'verses') {
                    attempt.verseStart = parseInt(document.getElementById('verseStart').value);
                    attempt.verseEnd = parseInt(document.getElementById('verseEnd').value);
                }
                if (document.getElementById('enableProblemPages').checked) {
                    const probRows = document.querySelectorAll('#problemPagesList .page-input-row');
                    const pagesArr = [];
                    probRows.forEach(r => {
                        const pNum = parseInt(r.querySelector('.prob-page-num').value);
                        const pCnt = parseInt(r.querySelector('.prob-page-count').value) || 1;
                        if (pNum) pagesArr.push({ page: pNum, count: pCnt });
                    });
                    attempt.problemPages = pagesArr;
                }
            } else if (currentSelectedTab === 'ajza' || currentSelectedTab === 'ahzab') {
                const scopeType = document.getElementById('juzAhzabScopeType').value;
                attempt.scopeType = scopeType;
                if (scopeType === 'unmemorized') {
                    const multiSelect = document.getElementById('unmemorizedSurahs');
                    attempt.unmemorizedSurahs = Array.from(multiSelect.selectedOptions).map(option => option.value);
                }
                if (document.getElementById('enableJuzProblemSurahs').checked) {
                    const multiProb = document.getElementById('juzProblemSurahsSelect');
                    attempt.problemSurahs = Array.from(multiProb.selectedOptions).map(option => option.value);
                }
            }

            if (editingAttemptIndex !== null) {
                targetData[currentSelectedIndex][editingAttemptIndex] = attempt;
            } else {
                targetData[currentSelectedIndex].push(attempt);
            }

            saveStudentsToStorage();
            renderList();
            renderEvalStats();
            displayHistory(currentSelectedIndex);
            closeDialog('evaluationDialog');
            sendDataToSketchware("EVALUATION_SAVED");
        }

        function saveGroupEvaluation() {
            const startIdx = parseInt(document.getElementById('groupSurahStart').value);
            const endIdx = parseInt(document.getElementById('groupSurahEnd').value);
            const errors = parseInt(document.getElementById('groupErrorsCount').value) || 0;
            const doubts = parseInt(document.getElementById('groupDoubtsCount').value) || 0;
            const hesitations = parseInt(document.getElementById('groupHesitationsCount').value) || 0;
            const tajweedErrors = parseInt(document.getElementById('groupTajweedCount').value) || 0;

            let totalDeduction = errors * settings.errorDeduction;
            totalDeduction += (doubts / 2) * settings.doubtDeduction;
            totalDeduction += tajweedErrors * settings.tajweedDeduction;

            let finalScore = 10 - totalDeduction;
            if (finalScore < 0) finalScore = 0;
            finalScore = Math.round(finalScore * 10) / 10;

            const startName = surahNames[startIdx - 1];
            const endName = surahNames[endIdx - 1];

            const student = studentsList.find(s => s.id === currentStudentId);
            if (!student.surahData) student.surahData = {};
            if (!student.groupEvaluations) student.groupEvaluations = [];

            const minS = Math.min(startIdx, endIdx);
            const maxS = Math.max(startIdx, endIdx);

            let unmemSurahs = [];
            if (document.getElementById('enableGroupUnmemorized').checked) {
                const unmemSelect = document.getElementById('groupUnmemorizedSelect');
                unmemSurahs = Array.from(unmemSelect.selectedOptions).map(opt => opt.value);
            }

            let probSurahs = [];
            if (document.getElementById('enableGroupProblemSurahs').checked) {
                const probSelect = document.getElementById('groupProblemSurahsSelect');
                probSurahs = Array.from(probSelect.selectedOptions).map(opt => opt.value);
            }

            const groupEvalRecord = {
                startSurah: startName,
                endSurah: endName,
                startIdx: minS,
                endIdx: maxS,
                score: finalScore,
                errors: errors,
                doubts: doubts,
                hesitations: hesitations,
                tajweedErrors: tajweedErrors,
                unmemorizedSurahs: unmemSurahs,
                problemSurahs: probSurahs,
                date: new Date().toLocaleDateString('ar-SA')
            };

            if (editingGroupAttemptIndex !== null) {
                student.groupEvaluations[editingGroupAttemptIndex] = groupEvalRecord;
            } else {
                student.groupEvaluations.push(groupEvalRecord);
            }

            for (let i = minS; i <= maxS; i++) {
                if (!student.surahData[i]) student.surahData[i] = [];
                student.surahData[i].push({
                    score: finalScore,
                    errors: errors,
                    doubts: doubts,
                    hesitations: hesitations,
                    tajweedErrors: tajweedErrors,
                    isGroupEval: true,
                    unmemorizedSurahs: unmemSurahs,
                    problemSurahs: probSurahs,
                    groupRange: `من سورة ${startName} إلى ${endName}`,
                    date: groupEvalRecord.date
                });
            }

            saveStudentsToStorage();
            renderList();
            renderEvalStats();
            closeDialog('groupEvaluationDialog');
            sendDataToSketchware("GROUP_EVALUATION_SAVED");
        }

        function renderGroupHistory() {
            const listContainer = document.getElementById('groupHistoryList');
            listContainer.innerHTML = '';
            const student = getCurrentStudentData();
            if (!student || !student.groupEvaluations || student.groupEvaluations.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:10px;">لا توجد تسميعات مجموعة مسجلة.</div>';
                return;
            }

            [...student.groupEvaluations].reverse().forEach((item, index) => {
                const realIdx = student.groupEvaluations.length - 1 - index;
                const div = document.createElement('div');
                div.className = 'history-item';

                let addonsText = '';
                if (item.unmemorizedSurahs && item.unmemorizedSurahs.length > 0) {
                    addonsText += `<br><span style="color:var(--danger-color); font-size:11px;">لم تحفظ: ${item.unmemorizedSurahs.join('، ')}</span>`;
                }
                if (item.problemSurahs && item.problemSurahs.length > 0) {
                    addonsText += `<br><span style="color:var(--warning-color); font-size:11px;">إشكال: ${item.problemSurahs.join('، ')}</span>`;
                }

                div.innerHTML = `
                    <div>
                        <strong>من ${item.startSurah} إلى ${item.endSurah}</strong><br>
                        <small style="color:#64748b;">${item.date} | أخطاء: ${item.errors}، شكوك: ${item.doubts}، ترددات: ${item.hesitations}، تجويد: ${item.tajweedErrors || 0}</small>
                        ${addonsText}
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="status-badge ${item.score >= 8.5 ? 'status-excellent' : 'status-good'}">${item.score}/10</span>
                        <button class="btn btn-danger" style="padding:2px 6px; font-size:12px;" onclick="deleteGroupAttempt(${realIdx})"><i class="ph ph-trash"></i></button>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        function deleteGroupAttempt(index) {
            const student = getCurrentStudentData();
            if (student && student.groupEvaluations && student.groupEvaluations[index]) {
                if (confirm("هل أنت متأكد من حذف هذه المحاولة؟")) {
                    student.groupEvaluations.splice(index, 1);
                    saveStudentsToStorage();
                    renderGroupHistory();
                    renderList();
                    renderEvalStats();
                }
            }
        }

        function displayHistory(index) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            const student = getCurrentStudentData();
            let targetData = currentSelectedTab === 'ahzab' ? student.data : (currentSelectedTab === 'suwar' ? student.surahData : student.ajzaData);
            const attempts = targetData[index] || [];

            if (attempts.length === 0) {
                historyList.innerHTML = '<div style="text-align:center; color:#64748b; padding:10px;">لا توجد محاولات سابقة.</div>';
                return;
            }

            [...attempts].reverse().forEach((attempt, revIdx) => {
                const actualIdx = attempts.length - 1 - revIdx;
                const item = document.createElement('div');
                item.className = 'history-item';

                let scopeText = '';
                if (currentSelectedTab === 'suwar' && attempt.scopeType === 'verses') {
                    scopeText = ` | الآيات: ${attempt.verseStart}-${attempt.verseEnd}`;
                } else if ((currentSelectedTab === 'ajza' || currentSelectedTab === 'ahzab') && attempt.scopeType === 'unmemorized' && attempt.unmemorizedSurahs && attempt.unmemorizedSurahs.length > 0) {
                    scopeText = ` | دون سورة: ${attempt.unmemorizedSurahs.join('، ')}`;
                }

                if (currentSelectedTab === 'suwar' && attempt.problemPages && attempt.problemPages.length > 0) {
                    scopeText += ` | صفحات بإشكال: ${attempt.problemPages.map(p => `ص${p.page}`).join('، ')}`;
                }
                if ((currentSelectedTab === 'ajza' || currentSelectedTab === 'ahzab') && attempt.problemSurahs && attempt.problemSurahs.length > 0) {
                    scopeText += ` | سور بإشكال: ${attempt.problemSurahs.join('، ')}`;
                }

                item.innerHTML = `
                    <div>
                        <strong>الدرجة: ${attempt.score} / 10 ${attempt.isGroupEval ? '<span style="color:var(--accent-color); font-size:11px;">(مجموعة)</span>' : ''}</strong> ${scopeText}<br>
                        <small style="color: #64748b;">${attempt.date} - أخطاء: ${attempt.errors}، شكوك: ${attempt.doubts}، ترددات: ${attempt.hesitations}، تجويد: ${attempt.tajweedErrors || 0}</small>
                    </div>
                    <div style="display:flex; gap:4px;">
                        <button class="btn btn-secondary" style="padding: 2px 6px; font-size: 12px;" onclick="editAttempt(${actualIdx})"><i class="ph ph-pencil-simple"></i></button>
                        <button class="btn btn-danger" style="padding: 2px 6px; font-size: 12px;" onclick="deleteAttempt(${actualIdx})"><i class="ph ph-trash"></i></button>
                    </div>
                `;
                historyList.appendChild(item);
            });
        }

        function deleteAttempt(attemptIndex) {
            if (confirm("هل أنت متأكد من حذف هذه المحاولة؟")) {
                const student = getCurrentStudentData();
                let targetData = currentSelectedTab === 'ahzab' ? student.data : (currentSelectedTab === 'suwar' ? student.surahData : student.ajzaData);
                targetData[currentSelectedIndex].splice(attemptIndex, 1);
                saveStudentsToStorage();
                renderList();
                renderEvalStats();
                displayHistory(currentSelectedIndex);
                sendDataToSketchware("EVALUATION_DELETED");
            }
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            const btn = document.getElementById('themeBtn');
            if (currentTheme === 'dark') {
                btn.innerHTML = '<i class="ph ph-sun"></i> مظهر فاتح';
            } else {
                btn.innerHTML = '<i class="ph ph-moon"></i> مظهر داكن';
            }
            sendDataToSketchware("THEME_CHANGED", currentTheme);
        }

        function toggleSortOrder() {
            sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            const btn = document.getElementById('sortBtn');
            btn.innerHTML = sortOrder === 'asc' ? '<i class="ph ph-sort-ascending"></i> ترتيب: تصاعدي' : '<i class="ph ph-sort-descending"></i> ترتيب: تنازلي';
            renderList();
        }

        function openSettings() {
            document.getElementById('errorDeduction').value = settings.errorDeduction;
            document.getElementById('doubtDeduction').value = settings.doubtDeduction;
            document.getElementById('tajweedDeduction').value = settings.tajweedDeduction || 0.25;
            document.getElementById('confidenceDeduction').value = settings.confidenceDeduction !== undefined ? settings.confidenceDeduction : 5;
            populateGroupDropdown();
            document.getElementById('settingsDialog').showModal();
        }

        function saveSettings() {
            settings.errorDeduction = parseFloat(document.getElementById('errorDeduction').value) || 1.0;
            settings.doubtDeduction = parseFloat(document.getElementById('doubtDeduction').value) || 1.0;
            settings.tajweedDeduction = parseFloat(document.getElementById('tajweedDeduction').value) || 0.25;
            settings.confidenceDeduction = parseFloat(document.getElementById('confidenceDeduction').value) || 0;
            localStorage.setItem('quran_teacher_settings', JSON.stringify(settings));
            closeDialog('settingsDialog');
            renderList();
            renderEvalStats();
            sendDataToSketchware("SETTINGS_SAVED");
        }

        function loadSettings() {
            const savedSettings = localStorage.getItem('quran_teacher_settings');
            if (savedSettings) {
                try {
                    settings = JSON.parse(savedSettings);
                } catch(e) {}
            }
        }

        function closeDialog(dialogId) {
            document.getElementById(dialogId).close();
        }

        function exportData() {
            const exportObject = {
                students: JSON.stringify(studentsList),
                currentId: currentStudentId,
                groups: JSON.stringify(groupsList),
                currentGroupId: currentGroupId,
                settings: JSON.stringify(settings)
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObject));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `quran_tracker_backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            sendDataToSketchware("DATA_EXPORTED");
        }

        function triggerImport() {
            document.getElementById('importFileInput').click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData.students) {
                        if (confirm("هل أنت متأكد من استيراد هذه النسخة؟ سيتم استبدال جميع بيانات الحلقات والطلاب الحالية بالأحزاب والسور والأجزاء.")) {
                            if (importedData.groups) localStorage.setItem('quran_groups_list', importedData.groups);
                            if (importedData.currentGroupId) localStorage.setItem('quran_current_group_id', importedData.currentGroupId);
                            localStorage.setItem('quran_students_list', importedData.students);
                            if (importedData.currentId) localStorage.setItem('quran_current_student_id', importedData.currentId);
                            if (importedData.settings) localStorage.setItem('quran_teacher_settings', importedData.settings);
                            
                            alert("تم استعادة البيانات بنجاح!");
                            loadSettings();
                            loadGroupsData();
                            loadStudentsData();
                            renderEvalStats();
                            sendDataToSketchware("DATA_IMPORTED");
                        }
                    } else {
                        alert("عذراً، هذا الملف غير صالح.");
                    }
                } catch (err) {
                    alert("حدث خطأ أثناء قراءة الملف.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        window.onload = function() {
            loadSettings();
            loadGroupsData();
            loadStudentsData();
            setupGroupSurahsDropdowns();
            renderList();
        };
    </script>
</body>
</html>
