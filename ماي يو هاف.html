<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظة الرموز الثنائية المستقلة</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --text: #ffffff;
            --text-muted: #aaa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: none;
        }
        .auth-screen {
            width: 100%;
            max-width: 350px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        h2, h3 { text-align: center; margin-top: 0; color: var(--primary); }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            box-sizing: border-box;
            font-size: 16px;
        }
        input { background: var(--input-bg); color: var(--text); }
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        
        .form-section {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .account-card {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-right: 5px solid var(--success);
        }
        .account-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .account-name { font-weight: bold; font-size: 16px; color: var(--text); }
        .token-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .token { font-size: 32px; font-weight: bold; color: var(--success); letter-spacing: 2px; }
        .timer { font-size: 13px; color: var(--text-muted); }
        .btn-delete { background: var(--danger); width: auto; padding: 6px 12px; font-size: 12px; margin: 0; }
        .btn-copy { background: var(--success); width: auto; padding: 6px 12px; font-size: 12px; margin: 0; }
    </style>
</head>
<body>

<div class="auth-screen" id="lockScreen">
    <h3>خزنة الرموز الآمنة</h3>
    <p style="color: var(--text-muted); font-size: 14px;">أدخل رمز PIN مخصص لفتح المحفظة</p>
    <input type="password" id="pinInput" placeholder="أدخل رمز الدخول (مثال: 1234)">
    <button onclick="checkPin()">دخول</button>
</div>
<a href="https://google.com">اضغط للتجربة</a>
<div class="container" id="mainContainer">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>مُولد الرموز الخاص بك</h2>
        <button onclick="logout()" style="width: auto; background: var(--danger); padding: 5px 10px; font-size: 12px; margin: 0;">قفل المحفظة</button>
    </div>
    
    <div class="form-section">
        <h4 style="margin: 0 0 10px 0;">إضافة حساب جديد</h4>
        <input type="text" id="accName" placeholder="اسم الحساب (مثال: wfman slayto)">
        <input type="text" id="accSecret" placeholder="المفتاح السري (Secret Key)">
        <button onclick="addAccount()">حفظ في الذاكرة المحلية</button>
    </div>

    <div id="accountsList"></div>
</div>

<script>
    const SECRET_PIN = "1234"; 

    let accounts = JSON.parse(localStorage.getItem('blogger_2fa_keys')) || [];

    // التشفير المدمج والمحدث لمعالجة الوقت بشكل صحيح
    function sha1_hmac(key, message) {
        let hkey = key.length > 64 ? sha1_raw(key) : key;
        let k_ipad = new Uint8Array(64), k_opad = new Uint8Array(64);
        for (let i = 0; i < 64; i++) {
            k_ipad[i] = (hkey[i] || 0) ^ 0x36;
            k_opad[i] = (hkey[i] || 0) ^ 0x5c;
        }
        let inner = sha1_raw(appendBuffer(k_ipad, message));
        return sha1_raw(appendBuffer(k_opad, inner));
    }

    function sha1_raw(bin) {
        let words = [];
        for (let i = 0; i < bin.length * 8; i += 8) words[i >> 5] |= (bin[i / 8] & 0xFF) << (24 - i % 32);
        let w = new Array(80), a = 1732584193, b = -271733879, c = -1732584194, d = 271733878, e = -1009589776;
        for (let i = 0; i < words.length || i < 16; i++) if (isNaN(words[i])) words[i] = 0;
        for (let i = 0; i < words.length; i += 16) {
            let olda = a, oldb = b, oldc = c, oldd = d, olde = e;
            for (let j = 0; j < 80; j++) {
                if (j < 16) w[j] = words[i + j];
                else w[j] = rol(w[j - 3] ^ w[j - 8] ^ w[j - 14] ^ w[j - 16], 1);
                let t = safe_add(safe_add(rol(a, 5), sha1_ft(j, b, c, d)), safe_add(safe_add(e, w[j]), sha1_kt(j)));
                e = d; d = c; c = rol(b, 30); b = a; a = t;
            }
            a = safe_add(a, olda); b = safe_add(b, oldb); c = safe_add(c, oldc); d = safe_add(d, oldd); e = safe_add(e, olde);
        }
        let res = new Uint8Array(20);
        for (let i = 0; i < 20; i++) res[i] = (a >> (24 - (i % 4) * 8)) & 0xFF;
        return res;
    }
    function sha1_ft(t, b, c, d) { if (t < 20) return (b & c) | ((~b) & d); if (t < 40) return b ^ c ^ d; if (t < 60) return (b & c) | (b & d) | (c & d); return b ^ c ^ d; }
    function sha1_kt(t) { return (t < 20) ? 1518500249 : (t < 40) ? 1859775393 : (t < 60) ? -1894007588 : -899497514; }
    function safe_add(x, y) { let lsw = (x & 0xFFFF) + (y & 0xFFFF), msw = (x >> 16) + (y >> 16) + (lsw >> 16); return (msw << 16) | (lsw & 0xFFFF); }
    function rol(num, cnt) { return (num << cnt) | (num >>> (32 - cnt)); }
    function appendBuffer(b1, b2) { let res = new Uint8Array(b1.length + b2.length); res.set(b1); res.set(b2, b1.length); return res; }

    function base32tohex(b32) {
        const b32chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
        let bits = "", hex = [];
        for (let i = 0; i < b32.length; i++) {
            const val = b32chars.indexOf(b32.charAt(i).toUpperCase());
            if (val === -1) continue;
            bits += val.toString(2).padStart(5, '0');
        }
        for (let i = 0; i + 8 <= bits.length; i += 8) {
            hex.push(parseInt(bits.substr(i, 8), 2));
        }
        return new Uint8Array(hex);
    }

    function getOTP(secret) {
        try {
            const key = base32tohex(secret);
            const epoch = Math.floor(Date.now() / 1000);
            let timeVal = Math.floor(epoch / 30);
            
            let timeBytes = new Uint8Array(8);
            for (let i = 7; i >= 0; i--) {
                timeBytes[i] = timeVal & 0xff;
                timeVal = Math.floor(timeVal / 256); // تعديل حسابات الوقت المتوافقة
            }
            const hash = sha1_hmac(key, timeBytes);
            const offset = hash[hash.length - 1] & 0xf;
            const binary = ((hash[offset] & 0x7f) << 24) | ((hash[offset + 1] & 0xff) << 16) | ((hash[offset + 2] & 0xff) << 8) | (hash[offset + 3] & 0xff);
            return (binary % 1000000).toString().padStart(6, '0');
        } catch (e) {
            return "000000";
        }
    }

    // فحص الـ PIN عند فتح الصفحة تلقائياً
    window.onload = function() {
        const savedPin = localStorage.getItem('user_wallet_pin');
        if (savedPin === SECRET_PIN) {
            openWallet();
        }
    }

    function checkPin() {
        const input = document.getElementById('pinInput').value;
        if(input === SECRET_PIN) {
            localStorage.setItem('user_wallet_pin', SECRET_PIN); // حفظ الرمز حتى لا يطلبه مجدداً
            openWallet();
        } else {
            alert('رمز PIN غير صحيح!');
        }
    }

    function openWallet() {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        renderAccounts();
        setInterval(renderAccounts, 1000);
    }

    function logout() {
        localStorage.removeItem('user_wallet_pin');
        location.reload();
    }

    function saveToStorage() {
        localStorage.setItem('blogger_2fa_keys', JSON.stringify(accounts));
        renderAccounts();
    }

    function addAccount() {
        const name = document.getElementById('accName').value.trim();
        const secret = document.getElementById('accSecret').value.trim().replace(/\s+/g, '').toUpperCase();

        if(!name || !secret) {
            alert('الرجاء كتابة الاسم والمفتاح السري معاً.');
            return;
        }

        accounts.push({ id: Date.now(), name: name, secret: secret });
        document.getElementById('accName').value = '';
        document.getElementById('accSecret').value = '';
        saveToStorage();
    }

    function deleteAccount(id) {
        if(confirm('هل أنت متأكد من حذف هذا الحساب نهائياً؟')) {
            accounts = accounts.filter(acc => acc.id !== id);
            saveToStorage();
        }
    }

    function copyToken(text) {
        const cleanText = text.replace(/\s+/g, ''); // نسخ الرقم بدون الفراغ
        navigator.clipboard.writeText(cleanText).then(() => {
            alert('تم نسخ الرمز بنجاح!');
        }).catch(() => {
            alert('فشل النسخ، انسخه يدوياً');
        });
    }

    function renderAccounts() {
        const listDiv = document.getElementById('accountsList');
        const epoch = Math.floor(Date.now() / 1000);
        const timeLeft = 30 - (epoch % 30);

        if (accounts.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color: var(--text-muted);">لا توجد حسابات مضافة حالياً.</p>';
            return;
        }

        if (listDiv.children.length !== accounts.length) {
            listDiv.innerHTML = '';
            accounts.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'account-card';
                card.innerHTML = `
                    <div class="account-info">
                        <div class="account-name">${acc.name}</div>
                        <button class="btn-delete" onclick="deleteAccount(${acc.id})">حذف</button>
                    </div>
                    <div class="token-display">
                        <div class="token" id="token-${acc.id}">000 000</div>
                        <button class="btn-copy" id="copyBtn-${acc.id}">نسخ</button>
                        <div class="timer" id="timer-${acc.id}">-- ث</div>
                    </div>
                `;
                listDiv.appendChild(card);
            });
        }

        accounts.forEach(acc => {
            const tokenEl = document.getElementById(`token-${acc.id}`);
            const timerEl = document.getElementById(`timer-${acc.id}`);
            const copyBtn = document.getElementById(`copyBtn-${acc.id}`);
            
            if (tokenEl && timerEl) {
                let rawToken = getOTP(acc.secret);
                let formattedToken = rawToken.substring(0,3) + " " + rawToken.substring(3,6);
                
                tokenEl.innerText = formattedToken;
                timerEl.innerText = `${timeLeft}ثانية`;
                
                // تحديث وظيفة زر النسخ للرمز الحالي
                copyBtn.onclick = function() { copyToken(rawToken); };
            }
        });
    }
</script>

</body>
</html>
