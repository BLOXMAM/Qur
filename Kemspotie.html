<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kemspotie</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --header-height: 60px;
        }
        body { font-family: sans-serif; margin: 0; padding-top: var(--header-height); background: #f5f6fa; }
        
        /* تنسيق الهيدر */
        .app-header {
            background-color: var(--primary-color);
            color: #ffffff;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-title { font-size: 18px; font-weight: bold; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; background-color: #d4edda; color: #155724; }
        
        .content { padding: 20px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div></div>
        <div class="header-title">Kemspotie</div>
        <div class="status-badge">متصل</div>
    </header>

    <div class="content">
        <h1>أهلاً بك في صفحة Kemspotie</h1>
        <p>تم إنشاء هذه الصفحة تلقائياً عبر لوحة التحكم.</p>
    </div>

</body>
</html>
